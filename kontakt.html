    </header>

    <main class="container form-container">
        <h1>Kontakta oss</h1>
        <p>Har du frågor inför ett bröllop, arrangemang eller företagsevent? Skicka ett meddelande till oss.</p>
        
        <form action="thank-you.html" method="GET" id="contact-form" onsubmit="return trackConversion('Kontaktforfragan', 'Kontaktformular', 0)">
            <input type="hidden" name="type" value="contact">
            <script src="https://js-eu1.hsforms.net/forms/embed/148702012.js" defer></script>
<div class="hs-form-frame" data-region="eu1" data-form-id="fd0fd690-47e9-41e0-b64d-786f4b2f28dd" data-portal-id="148702012"></div>
            <div class="form-group">
                <label for="contact-name">Namn</label>
                <input type="text" id="contact-name" name="name" required placeholder="Ditt fullständiga namn">
            </div>
            
            <div class="form-group">
                <label for="contact-email">E-postadress</label>
                <input type="email" id="contact-email" name="email" required placeholder="din.epost@doman.se">
            </div>

            <div class="form-group">
                <label for="subject">Ärende</label>
                <select id="subject" name="subject">
                    <option value="allmant">Allmän fråga</option>
                    <option value="brollop">Bröllop & Fest</option>
                    <option value="foretag">Företagsblommor</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Meddelande</label>
                <textarea id="message" name="message" rows="5" required placeholder="Skriv ditt meddelande här..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Skicka meddelande</button>
        </form>
    </main>
